<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Калькулятор топливной смеси</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#111111">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FMC">
<meta name="mobile-web-app-capable" content="yes">

<style>

body{
    font-family: Arial;
    background:#111;
    color:#fff;
    margin:0;
    padding:16px;
}

.box{
    max-width:480px;
    margin:0 auto;
    background:#1b1b1b;
    padding:20px;
    border-radius:16px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.mode{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.mode button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#2a2a2a;
    color:#fff;
    font-size:15px;
    cursor:pointer;
}

.mode button.active{
    background:#00c853;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:6px;
}

input,select{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#2a2a2a;
    color:#fff;
    font-size:16px;
    box-sizing:border-box;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#262626;
    border-radius:12px;
    line-height:1.7;
}

.highlight{
    color:#00e676;
    font-weight:bold;
}

.small{
    opacity:0.7;
    font-size:13px;
    margin-top:6px;
}

</style>
</head>

<body>

<div class="box">

<h1>Калькулятор топливной смеси</h1>

<div class="mode">

<button
id="currentBtn"
class="active"
onclick="setMode('current')">

Частичная заправка

</button>

<button
id="fullBtn"
onclick="setMode('full')">

До полного бака

</button>

</div>

<label>Желаемая смесь</label>

<select id="mix">

<option value="5">E5</option>
<option value="10">E10</option>
<option value="15">E15</option>
<option value="20">E20</option>
<option value="25">E25</option>
<option value="30">E30</option>
<option value="35">E35</option>
<option value="40">E40</option>
<option value="45">E45</option>
<option value="50">E50</option>
<option value="55">E55</option>
<option value="60">E60</option>
<option value="65">E65</option>
<option value="70">E70</option>
<option value="75">E75</option>
<option value="80">E80</option>
<option value="85">E85</option>

</select>

<div class="small">
E — нужный процент содержания спирта в смеси
</div>

<label>Тип спирта</label>

<select id="alcoholType">

<option value="1.045">
Этиловый спирт 95–96%
</option>

<option value="1.31">
Изопропиловый спирт 99.9%
</option>

</select>

<div id="fuelBlock">

<label>Бензина в баке (л)</label>

<input
id="fuel"
type="text"
inputmode="decimal"
placeholder="Например 30">

<div class="small">
Спирт добавляется к уже имеющемуся бензину → общий объём увеличивается
</div>

</div>

<div id="tankBlock" style="display:none;">

<label>Объём бака (л)</label>

<input
id="tank"
type="text"
inputmode="decimal"
placeholder="Например 65">

<div class="small">
Сначала заливается спирт, затем бак доливается бензином до полного
</div>

</div>

<div class="result" id="res">
Введите данные
</div>

</div>

<script>

let mode = 'current';

function n(v){
    return parseFloat((v || '').replace(',', '.'));
}

const mix = document.getElementById('mix');
const fuel = document.getElementById('fuel');
const tank = document.getElementById('tank');
const alcoholType = document.getElementById('alcoholType');

mix.addEventListener('change', calc);
fuel.addEventListener('input', calc);
tank.addEventListener('input', calc);
alcoholType.addEventListener('change', calc);

function setMode(selected){

    mode = selected;

    document
    .getElementById('currentBtn')
    .classList
    .remove('active');

    document
    .getElementById('fullBtn')
    .classList
    .remove('active');

    if(mode === 'current'){

        document
        .getElementById('currentBtn')
        .classList
        .add('active');

        document
        .getElementById('fuelBlock')
        .style
        .display = 'block';

        document
        .getElementById('tankBlock')
        .style
        .display = 'none';
    }
    else{

        document
        .getElementById('fullBtn')
        .classList
        .add('active');

        document
        .getElementById('fuelBlock')
        .style
        .display = 'none';

        document
        .getElementById('tankBlock')
        .style
        .display = 'block';
    }

    calc();
}

function calc(){

    const e = n(mix.value);
    const k = n(alcoholType.value);

    if(mode === 'current'){

        const gasoline = n(fuel.value);

        if(!gasoline){

            document.getElementById('res').innerHTML =
            'Введите количество бензина';

            return;
        }

        // Vспирта = (K * E * Vбензина) / (100 - E)

        const alcohol =
        (k * e * gasoline) / (100 - e);

        const total =
        gasoline + alcohol;

        document.getElementById('res').innerHTML =

        'Нужно добавить:<br><span class="highlight">' +
        alcohol.toFixed(2) +
        ' л спирта</span><br><br>' +

        'Бензина в баке:<br><span class="highlight">' +
        gasoline.toFixed(2) +
        ' л</span><br><br>' +

        'Общий объём смеси:<br><span class="highlight">' +
        total.toFixed(2) +
        ' л</span><br><br>' +

        'Получится смесь:<br><span class="highlight">E' +
        e +
        '</span>';
    }

    else{

        const tankVolume = n(tank.value);

        if(!tankVolume){

            document.getElementById('res').innerHTML =
            'Введите объём бака';

            return;
        }

        // Vспирта = K * E/100 * Vбака

        const alcohol =
        k * (e / 100) * tankVolume;

        const gasoline =
        tankVolume - alcohol;

        document.getElementById('res').innerHTML =

        'Нужно залить:<br><span class="highlight">' +
        alcohol.toFixed(2) +
        ' л спирта</span><br><br>' +

        'И долить:<br><span class="highlight">' +
        gasoline.toFixed(2) +
        ' л бензина</span><br><br>' +

        'Итоговый объём смеси:<br><span class="highlight">' +
        tankVolume.toFixed(2) +
        ' л</span><br><br>' +

        'Получится смесь:<br><span class="highlight">E' +
        e +
        '</span>';
    }
}

if('serviceWorker' in navigator){
// navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
