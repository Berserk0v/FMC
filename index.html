<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Калькулятор топливной смеси</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>

body{
    font-family: Arial;
    background:#111;
    color:#fff;
    margin:0;
    padding:16px;
}

.box{
    max-width:480px;
    margin:0 auto;
    background:#1b1b1b;
    padding:20px;
    border-radius:16px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.mode{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.mode button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#2a2a2a;
    color:#fff;
    font-size:15px;
    cursor:pointer;
}

.mode button.active{
    background:#00c853;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:6px;
}

input,
select{
    width:100%;
    min-width:100%;
    max-width:100%;

    display:block;

    padding:14px;

    border-radius:12px;
    border:none;

    background:#2a2a2a;
    color:#fff;

    font-size:16px;

    box-sizing:border-box;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#262626;
    border-radius:12px;
    line-height:1.7;
}

.highlight{
    color:#00e676;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h1>Калькулятор топливной смеси</h1>

<div class="mode">

<button
id="currentBtn"
class="active"
onclick="setMode('current')">

Частичная заправка

</button>

<button
id="fullBtn"
onclick="setMode('full')">

До полного бака

</button>

</div>

<label>Желаемая смесь</label>

<select id="mix">

<option value="5">E5</option>
<option value="10">E10</option>
<option value="15">E15</option>
<option value="20">E20</option>
<option value="25">E25</option>
<option value="30">E30</option>
<option value="35">E35</option>
<option value="40">E40</option>
<option value="45">E45</option>
<option value="50">E50</option>
<option value="55">E55</option>
<option value="60">E60</option>
<option value="65">E65</option>
<option value="70">E70</option>
<option value="75">E75</option>
<option value="80">E80</option>
<option value="85">E85</option>
<option value="90">E90</option>

</select>

<div id="fuelBlock">

<label>Бензина в баке (л)</label>

<input
id="fuel"
type="text"
inputmode="decimal"
placeholder="Например 30">

</div>

<div id="tankBlock" style="display:none;">

<label>Объём бака (л)</label>

<input
id="tank"
type="text"
inputmode="decimal"
placeholder="Например 65">

</div>

<div class="result" id="res">
Введите данные
</div>

</div>

<script>

let mode = 'current';

function n(v){
    return parseFloat((v || '').replace(',', '.'));
}

const mix = document.getElementById('mix');
const fuel = document.getElementById('fuel');
const tank = document.getElementById('tank');

mix.addEventListener('change', calc);
fuel.addEventListener('input', calc);
tank.addEventListener('input', calc);

function setMode(selected){

    mode = selected;

    document
    .getElementById('currentBtn')
    .classList
    .remove('active');

    document
    .getElementById('fullBtn')
    .classList
    .remove('active');

    if(mode === 'current'){

        document
        .getElementById('currentBtn')
        .classList
        .add('active');

        document
        .getElementById('fuelBlock')
        .style
        .display = 'block';

        document
        .getElementById('tankBlock')
        .style
        .display = 'none';
    }
    else{

        document
        .getElementById('fullBtn')
        .classList
        .add('active');

        document
        .getElementById('fuelBlock')
        .style
        .display = 'none';

        document
        .getElementById('tankBlock')
        .style
        .display = 'block';
    }

    calc();
}

function calc(){

    const e = n(mix.value);

    // Частичная заправка

    if(mode === 'current'){

        const gasoline = n(fuel.value);

        if(!gasoline){

            document.getElementById('res').innerHTML =
            'Введите количество бензина';

            return;
        }

        // Формула:
        // Vспирта = (E * Vбензина) / (100 - E)

        const alcohol =
        (e * gasoline) / (100 - e);

        const total =
        gasoline + alcohol;

        document.getElementById('res').innerHTML =

        'Нужно добавить:<br><span class="highlight">' +
        alcohol.toFixed(2) +
        ' л спирта</span><br><br>' +

        'Бензина в баке:<br><span class="highlight">' +
        gasoline.toFixed(2) +
        ' л</span><br><br>' +

        'Итоговый объём смеси:<br><span class="highlight">' +
        total.toFixed(2) +
        ' л</span><br><br>' +

        'Получится смесь:<br><span class="highlight">E' +
        e +
        '</span>';
    }

    // До полного бака

    else{

        const tankVolume = n(tank.value);

        if(!tankVolume){

            document.getElementById('res').innerHTML =
            'Введите объём бака';

            return;
        }

        // Формула:
        // Vспирта = E/100 * Vбака

        const alcohol =
        (e / 100) * tankVolume;

        const gasoline =
        tankVolume - alcohol;

        document.getElementById('res').innerHTML =

        'Нужно залить:<br><span class="highlight">' +
        alcohol.toFixed(2) +
        ' л спирта</span><br><br>' +

        'И долить:<br><span class="highlight">' +
        gasoline.toFixed(2) +
        ' л бензина</span><br><br>' +

        'Итоговый объём смеси:<br><span class="highlight">' +
        tankVolume.toFixed(2) +
        ' л</span><br><br>' +

        'Получится смесь:<br><span class="highlight">E' +
        e +
        '</span>';
    }
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
